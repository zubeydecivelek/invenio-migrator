name: CI

on:
  push:
    branches: master
  pull_request:
    branches: master
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: "0 3 * * 6"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason"
        required: false
        default: "Manual trigger"

jobs:
  Tests:
    runs-on: ubuntu-latest

    container:
      image: python:2.7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upgrade pip (Python 2.7 compatible)
        run: pip install "pip<21" "setuptools<45" "wheel"

      - name: Install project with extras
        run: pip install .[tests,docs]

      - name: Run test suite
        run: bash run-tests.sh