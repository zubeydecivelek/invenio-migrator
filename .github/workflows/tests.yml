name: CI

on:
  push:
    branches: master
  pull_request:
    branches: master
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: "0 3 * * 6"
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason"
        required: false
        default: "Manual trigger"

jobs:
  UnitTests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: "3.8"

      - name: Upgrade pip
        run: pip install --upgrade pip setuptools wheel

      - name: Install project with extras
        run: pip install .[tests,docs,loader]

      - name: Run unit tests
        run: bash run-tests.sh

  LegacyTests:
    runs-on: ubuntu-20.04

    services:
      mysql:
        image: mysql:5.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: invenio1
          MYSQL_USER: invenio1
          MYSQL_PASSWORD: dbpass123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      LEGACY: maint-1.2
      INVENIO_ADMIN_EMAIL: info@inveniosoftware.org
      INVENIO_WEB_HOST: 127.0.0.1
      INVENIO_WEB_USER: runner
      INVENIO_WEB_SMTP_PORT: "0"
      INVENIO_MYSQL_HOST: 127.0.0.1
      INVENIO_MYSQL_DBNAME: invenio1
      INVENIO_MYSQL_DBUSER: invenio1
      INVENIO_MYSQL_DBPASS: dbpass123

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 2.7
        uses: actions/setup-python@v4
        with:
          python-version: "2.7"

      - name: Upgrade pip (Python 2.7 compatible)
        run: pip install "pip<21" "setuptools<45" "wheel"

      - name: Pin Python 2.7 incompatible transitive deps
        run: pip install "invenio-db[versioning]>=1.0.0b3,<1.1.0" "importlib-metadata<3"

      - name: Install project with all extras
        run: pip install -e .[all]

      - name: Provision and populate legacy Invenio instance
        run: bash tests/legacy/scripts/invenio-legacy-kickstart.sh

      - name: Run legacy record dump tests
        run: py.test tests/legacy/test_record_dump.py -v
